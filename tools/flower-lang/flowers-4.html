<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>flowers · round 4 preview</title>
<style>
:root{
  --paper:#f8f4ed; --ink:#2a2520; --ink-dim:#7a6f5f;
  --brick:#c64a2a; --moss:#4a6b3a; --brass:#d4a74a;
  --plum:#6a3a5d; --lavender:#a38bc4; --peach:#e89a7a;
}
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400;1,600&family=JetBrains+Mono:wght@400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Fraunces',serif;padding:48px;min-height:100vh}
h1{font-size:24px;font-style:italic;font-weight:400;margin-bottom:8px}
.sub{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:32px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:32px}
.card{background:var(--paper);border:1px solid rgba(42,37,32,0.15);border-radius:14px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px}
.card svg.show{width:120px;height:140px;display:block}
.card .name{font-size:16px;font-weight:600;font-style:italic}
.card .id{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-dim)}
</style>
</head>
<body>
<h1>flowers · round 4</h1>
<div class="sub">4 illustrations · peony / tulip / lavender / daisy</div>

<svg width="0" height="0" style="position:absolute"
     stroke="var(--ink)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
<defs>

  <!-- ============== 6. 牡丹 (层叠花瓣) ============== -->
  <symbol id="fl-peony" viewBox="0 0 120 140">
    <!-- 茎 -->
    <path d="M 60 80 L 60 135"/>
    <!-- 左叶 (心形大叶) -->
    <path d="M 60 108 C 38 100, 22 112, 28 128 C 42 132, 58 118, 60 112 Z" fill="var(--moss)"/>
    <path d="M 60 108 C 42 114, 32 120, 30 126" stroke-width="0.6"/>
    <!-- 右叶 -->
    <path d="M 60 120 C 78 115, 92 124, 88 135" fill="none"/>
    <!-- 外层花瓣 (波浪外轮廓,像一朵密花的外形) -->
    <path d="M 30 48 C 22 30, 38 14, 60 22 C 82 14, 98 30, 90 48
             C 104 55, 100 72, 82 76
             C 80 88, 60 92, 60 92
             C 60 92, 40 88, 38 76
             C 20 72, 16 55, 30 48 Z"
          fill="var(--peach)"/>
    <!-- 内部两大瓣 (左右对称) -->
    <path d="M 36 42 C 40 28, 58 26, 58 40" fill="var(--peach)" opacity="0.7"/>
    <path d="M 62 40 C 62 26, 80 28, 84 42" fill="var(--peach)" opacity="0.7"/>
    <!-- 花瓣分隔线 -->
    <path d="M 40 60 C 44 55, 52 55, 56 60"/>
    <path d="M 64 60 C 68 55, 76 55, 80 60"/>
    <path d="M 46 72 C 50 68, 56 68, 58 72"/>
    <path d="M 62 72 C 64 68, 70 68, 74 72"/>
    <!-- 中心 (更紧密的一层) -->
    <path d="M 50 50 C 50 42, 58 42, 60 48 C 62 42, 70 42, 70 50 C 70 56, 60 58, 60 58 C 60 58, 50 56, 50 50 Z" fill="var(--peach)" opacity="0.85"/>
    <!-- 花心小皱褶 -->
    <path d="M 56 50 L 60 54 L 64 50"/>
  </symbol>

  <!-- ============== 7. 红郁金香 (杯状) ============== -->
  <symbol id="fl-tulip-red" viewBox="0 0 120 140">
    <!-- 茎 -->
    <path d="M 60 72 L 60 135"/>
    <!-- 左长叶 -->
    <path d="M 60 100 C 42 112, 32 128, 36 135 L 42 135 C 48 125, 58 115, 60 108 Z" fill="var(--moss)"/>
    <!-- 右长叶 -->
    <path d="M 60 118 C 74 120, 84 130, 82 135" fill="none"/>
    <!-- 中间大瓣 (后景,最高) -->
    <path d="M 60 72 C 48 62, 46 34, 60 20 C 74 34, 72 62, 60 72 Z" fill="var(--brick)"/>
    <!-- 左前瓣 -->
    <path d="M 60 72 C 42 68, 34 44, 48 28 C 52 40, 54 56, 60 72 Z" fill="var(--brick)" opacity="0.88"/>
    <!-- 右前瓣 -->
    <path d="M 60 72 C 78 68, 86 44, 72 28 C 68 40, 66 56, 60 72 Z" fill="var(--brick)" opacity="0.88"/>
    <!-- 瓣间分隔线 -->
    <path d="M 60 30 L 60 70"/>
    <path d="M 50 38 C 52 50, 56 62, 60 70"/>
    <path d="M 70 38 C 68 50, 64 62, 60 70"/>
  </symbol>

  <!-- ============== 8. 薰衣草 (细穗) ============== -->
  <symbol id="fl-lavender" viewBox="0 0 120 140">
    <!-- 茎 -->
    <path d="M 60 65 L 60 135"/>
    <!-- 基部窄叶 -->
    <path d="M 60 108 C 48 114, 42 126, 46 134" fill="none"/>
    <path d="M 60 115 C 72 120, 78 130, 76 135" fill="none"/>
    <!-- 穗状花序 (从下往上递小,左右交错) -->
    <g fill="var(--lavender)">
      <ellipse cx="55" cy="60" rx="4.5" ry="3.2"/>
      <ellipse cx="65" cy="56" rx="4.5" ry="3.2"/>
      <ellipse cx="54" cy="51" rx="4.3" ry="3"/>
      <ellipse cx="66" cy="47" rx="4.3" ry="3"/>
      <ellipse cx="55" cy="42" rx="4" ry="2.8"/>
      <ellipse cx="65" cy="38" rx="4" ry="2.8"/>
      <ellipse cx="56" cy="33" rx="3.6" ry="2.5"/>
      <ellipse cx="64" cy="29" rx="3.6" ry="2.5"/>
      <ellipse cx="57" cy="24" rx="3.2" ry="2.3"/>
      <ellipse cx="63" cy="20" rx="3.2" ry="2.3"/>
      <ellipse cx="60" cy="15" rx="2.8" ry="2"/>
      <ellipse cx="60" cy="10" rx="2.2" ry="1.8"/>
    </g>
    <!-- 茎上两三片小叶 -->
    <path d="M 60 90 C 52 92, 48 96, 48 100" fill="none" stroke-width="0.8"/>
    <path d="M 60 75 C 66 76, 70 78, 70 82" fill="none" stroke-width="0.8"/>
  </symbol>

  <!-- ============== 9. 雏菊 (正视) ============== -->
  <symbol id="fl-daisy" viewBox="0 0 120 140">
    <!-- 茎 -->
    <path d="M 60 75 L 60 135"/>
    <!-- 叶 -->
    <path d="M 60 110 C 45 108, 38 116, 42 124 C 50 126, 58 120, 60 116 Z" fill="var(--moss)"/>
    <path d="M 60 120 C 72 118, 80 126, 78 134" fill="none"/>
    <!-- 12 片白瓣 (纯线稿) -->
    <g fill="var(--paper)">
      <ellipse cx="60" cy="24" rx="5" ry="13"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(30 60 50)"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(60 60 50)"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(90 60 50)"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(120 60 50)"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(150 60 50)"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(180 60 50)"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(210 60 50)"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(240 60 50)"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(270 60 50)"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(300 60 50)"/>
      <ellipse cx="60" cy="24" rx="5" ry="13" transform="rotate(330 60 50)"/>
    </g>
    <!-- 黄色花心 -->
    <circle cx="60" cy="50" r="9" fill="var(--brass)"/>
    <!-- 花心小点 -->
    <g fill="var(--ink)" stroke="none">
      <circle cx="57" cy="48" r="0.8"/>
      <circle cx="62" cy="47" r="0.8"/>
      <circle cx="60" cy="52" r="0.8"/>
      <circle cx="63" cy="51" r="0.8"/>
    </g>
  </symbol>

</defs>
</svg>

<div class="grid">
  <div class="card">
    <svg class="show" viewBox="0 0 120 140" stroke="var(--ink)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"><use href="#fl-peony"/></svg>
    <div class="name">Peony · 牡丹</div>
    <div class="id">fl-peony</div>
  </div>
  <div class="card">
    <svg class="show" viewBox="0 0 120 140" stroke="var(--ink)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"><use href="#fl-tulip-red"/></svg>
    <div class="name">Red Tulip · 红郁金香</div>
    <div class="id">fl-tulip-red</div>
  </div>
  <div class="card">
    <svg class="show" viewBox="0 0 120 140" stroke="var(--ink)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"><use href="#fl-lavender"/></svg>
    <div class="name">Lavender · 薰衣草</div>
    <div class="id">fl-lavender</div>
  </div>
  <div class="card">
    <svg class="show" viewBox="0 0 120 140" stroke="var(--ink)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"><use href="#fl-daisy"/></svg>
    <div class="name">Daisy · 雏菊</div>
    <div class="id">fl-daisy</div>
  </div>
</div>

</body>
</html>
