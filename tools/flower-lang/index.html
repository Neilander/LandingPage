<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Flower Language · 花语</title>
<!--
  奶白极简 + 中央粒子云 -> 搜索触发 -> 粒子先散开再聚成花的线条 -> 文字淡入
  技术: canvas 2D 粒子系统; 每朵花预定义一个 SVG <path>, 用 getPointAtLength 采点作为粒子目标.
-->
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{
  --bg:#fdfbf5;
  --ink:#1a1a1a;
  --ink-mid:#5a5245;
  --ink-dim:#9a9285;
  --accent:#7a6a4a;
}
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300;400&family=Noto+Sans+SC:wght@300;400&family=JetBrains+Mono:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:'Inter','Noto Sans SC',system-ui,sans-serif;overflow-x:hidden}

/* header */
header{display:flex;justify-content:space-between;align-items:center;padding:24px clamp(28px,4vw,64px);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:var(--ink-dim)}
header .brand{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:14px;letter-spacing:0;color:var(--ink-mid)}
header a{color:var(--ink-dim);text-decoration:none;transition:color 0.2s}
header a:hover{color:var(--ink)}

/* hero */
.hero{max-width:720px;margin:0 auto;padding:56px clamp(24px,4vw,48px) 0;text-align:center}
html{scroll-behavior:smooth}
.hero h1{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-variation-settings:"opsz" 72;
  font-size:clamp(40px,6vw,76px);letter-spacing:-0.02em;color:#1a1a1a;
}
.hero h1 em{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-variation-settings:"opsz" 72;color:var(--accent)}
.hero .tag{margin-top:12px;font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:16px;color:#777}

.search{max-width:560px;margin:36px auto 14px;padding:0 12px}
.search input{
  width:100%;padding:14px 20px;border:none;border-bottom:1.5px solid #1a1a1a;background:transparent;color:#1a1a1a;
  font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:28px;text-align:center;outline:none;
}
.search input::placeholder{color:var(--ink-dim);font-style:italic;opacity:0.55}

.hints{text-align:center;margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-dim)}
.hints span.label{margin-right:6px;opacity:0.7}
.hints button{margin:2px;padding:4px 9px;border:none;background:transparent;color:var(--ink-mid);cursor:pointer;font-family:inherit;font-size:inherit;letter-spacing:inherit;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color 0.2s,color 0.2s}
.hints button:hover{color:var(--ink);text-decoration-color:var(--ink)}

/* 中央粒子舞台 */
.stage{
  position:relative;margin:14px auto 0;
  width:min(440px,76vw);height:min(440px,76vw);
}
canvas#fx{position:absolute;inset:0;width:100%;height:100%;display:block}

/* 花的文字信息 (搜到后从舞台下方淡入) */
.flower-text{
  max-width:560px;margin:0 auto;padding:4px clamp(24px,4vw,48px) 20px;text-align:center;min-height:112px;
  opacity:0;transform:translateY(8px);transition:opacity 0.7s ease,transform 0.7s ease;
}
.flower-text.on{opacity:1;transform:translateY(0)}
.flower-text .zh{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-variation-settings:"opsz" 48;font-size:30px;color:#1a1a1a;letter-spacing:-0.01em;line-height:1.1}
.flower-text .zh em{color:var(--accent)}
.flower-text .en{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink-dim);margin-top:3px}
.flower-text .meaning{margin-top:8px;font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:17px;color:var(--ink-mid);line-height:1.45}
.flower-text .canon{margin-top:6px;font-family:'Noto Serif SC','Fraunces',serif;font-weight:400;font-size:13px;color:var(--ink-dim);line-height:1.6;letter-spacing:0.06em}
.flower-text .num{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.3em;color:var(--ink-dim);opacity:0.65}

.initial-hint{
  position:absolute;inset:auto 0 20px 0;text-align:center;
  font-family:'Fraunces',serif;font-style:italic;font-size:15px;color:var(--ink-dim);
  transition:opacity 0.4s ease;pointer-events:none;
}
.initial-hint.hidden{opacity:0}

/* footer */
footer{text-align:center;padding:28px 20px 36px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:var(--ink-dim)}
footer a{color:var(--ink-mid);text-decoration:none;margin:0 8px}
footer a:hover{color:var(--ink)}

/* 隐形 SVG 库: 存每朵花的 <path>, 用 getPointAtLength 采样 */
.hidden-paths{position:absolute;width:0;height:0;visibility:hidden;pointer-events:none}
</style>

  <a href="../../index.html">← Neil's Land</a>

  <h1>Flower <em>Language</em></h1>
  <div class="tag">一个词，一朵花 — say a word, meet a flower.</div>

<footer>

/* ============ 搜索匹配 ============ */
function search(qRaw){
  const q = (qRaw || '').trim().toLowerCase();
  if(!q) return null;
  const terms = q.split(/[\s,，、]+/).filter(Boolean);
  const scored = FLOWERS.map(f => {
    const hay = [f.zh, f.en, f.meaning, ...f.tags].join(' ').toLowerCase();
    let score = 0;
    for(const t of terms){
      if(!t) continue;
      if(f.tags.some(tag => tag.toLowerCase() === t)) score += 3;
      else if(f.tags.some(tag => tag.toLowerCase().includes(t))) score += 2;
      else if(hay.includes(t)) score += 1;
    }
    return { flower:f, score };
  }).filter(x => x.score > 0);
  scored.sort((a,b) => b.score - a.score);
  return scored[0] ? scored[0].flower : null;
}

/* ============ 粒子系统 ============ */
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
const dpr = Math.min(window.devicePixelRatio || 1, 2);

const N = 820;
const parts = [];
let W = 0, H = 0;
let mode = 'cluster';      // 'cluster' | 'flower'
let currentFlowerId = null;
let cachedPoints = {};

function resize(){
  const r = canvas.getBoundingClientRect();
  W = r.width || 560; H = r.height || 560;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if(parts.length){
    if(mode === 'cluster') seedCluster();
    else if(currentFlowerId) seedFlower(currentFlowerId);
  }
}

function initParticles(){
  for(let i=0;i<N;i++){
    parts.push({
      x: Math.random()*W, y: Math.random()*H,
      tx: W/2, ty: H/2,
      /* 新 target 会先存这里,到 transitionAt 时才正式切过去 */
      newTx: undefined, newTy: undefined, transitionAt: 0,
      vx:0, vy:0,
      size: 0.6 + Math.random()*0.9,
      alpha: 0.55 + Math.random()*0.35,
      phase: Math.random()*Math.PI*2,
    });
  }
}

/* 错峰赋新 target: 按"距当前点的距离"错峰 —
   远的早动,近的晚动,形成"从外向内汇聚"的方向感,不是大开大合的散 */
function assignTargets(getXY, maxDelay){
  const now = performance.now();
  /* 先算出所有距离,归一化,用来推导每个粒子的 delay */
  const dists = parts.map((p, i) => {
    const [tx, ty] = getXY(i);
    return Math.hypot(tx - p.x, ty - p.y);
  });
  const maxD = Math.max(...dists) || 1;
  parts.forEach((p, i) => {
    const [tx, ty] = getXY(i);
    p.newTx = tx; p.newTy = ty;
    /* 远的 delay 接近 0, 近的 delay 接近 maxDelay, 加一点随机避免齐整 */
    const norm = 1 - dists[i] / maxD;        // 近→1,远→0
    p.transitionAt = now + norm * maxDelay * 0.7 + Math.random() * maxDelay * 0.3;
  });
}

function seedCluster(){
  const cx = W/2, cy = H/2;
  assignTargets(() => {
    const a = Math.random()*Math.PI*2;
    const r = Math.random()*Math.min(W,H)*0.08;
    return [cx + Math.cos(a)*r, cy + Math.sin(a)*r];
  }, 900);
}

function samplePath(pathEl, count){
  const len = pathEl.getTotalLength();
  if(len === 0) return [];
  const pts = [];
  for(let i=0;i<count;i++){
    const p = pathEl.getPointAtLength((i/count) * len);
    pts.push([p.x, p.y]);
  }
  return pts;
}

/* 花的 path 采得密一些, 粒子能沿着线切线方向流动 */
const FLOWER_SAMPLES = 1800;
function seedFlower(id){
  const pathEl = document.getElementById('p-' + id);
  if(!pathEl){ seedCluster(); return; }
  if(!cachedPoints[id]) cachedPoints[id] = samplePath(pathEl, FLOWER_SAMPLES);
  const src = cachedPoints[id];
  const scale = Math.min(W, H) * 0.85 / 300;
  const cx = W/2, cy = H/2;
  /* 每粒子锁定 path 上一个点作为"锚", 成型后在锚点周围小幅呼吸 */
  parts.forEach(p => {
    const idx = Math.floor(Math.random() * FLOWER_SAMPLES);
    const [sx, sy] = src[idx];
    p.anchorX = cx + (sx - 150) * scale;
    p.anchorY = cy + (sy - 150) * scale;
    p.flowerRef = id;
  });
  /* 错峰 1100ms 内陆续切到锚点 */
  assignTargets((i) => [parts[i].anchorX, parts[i].anchorY], 1100);
}

function loop(){
  const t = performance.now();

  /* 残影清一些, 线条才锐 */
  ctx.fillStyle = 'rgba(253,251,245,0.32)';
  ctx.fillRect(0, 0, W, H);

  parts.forEach(p => {
    /* 延时切换 target (每粒子独立时刻) */
    if(p.newTx !== undefined && t >= p.transitionAt){
      p.tx = p.newTx;
      p.ty = p.newTy;
      p.newTx = undefined;
    }
    /* cluster: 整体轻微漂动 */
    if(mode === 'cluster'){
      p.tx += Math.cos(t*0.0006 + p.phase) * 0.18;
      p.ty += Math.sin(t*0.0007 + p.phase*1.3) * 0.18;
    }
    /* 花态 + 已到位: 粒子只在自己锚点周围 ~3px 半径呼吸, 不沿线漂 */
    else if(mode === 'flower' && p.newTx === undefined && p.anchorX !== undefined){
      p.tx = p.anchorX + Math.cos(t*0.0011 + p.phase) * 3.0;
      p.ty = p.anchorY + Math.sin(t*0.0013 + p.phase*1.3) * 3.0;
    }
    const dx = p.tx - p.x, dy = p.ty - p.y;
    /* 弹簧 + 极小噪声; 粒子跟 target 走, target 本身就在 path 上滑 */
    const noise = (mode === 'flower') ? 0.008 : 0.03;
    p.vx += dx * 0.022 + (Math.random()-0.5) * noise;
    p.vy += dy * 0.022 + (Math.random()-0.5) * noise;
    p.vx *= 0.88; p.vy *= 0.88;
    p.x += p.vx; p.y += p.vy;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    const a = p.alpha * (0.65 + Math.sin(t*0.001 + p.phase)*0.25);
    ctx.fillStyle = `rgba(26,26,26,${a})`;
    ctx.fill();
  });

  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize();        /* 1. 先算出 W/H */
initParticles(); /* 2. 再用有效的 W/H 初始化 520 个粒子 */
seedCluster();   /* 3. 给它们第一波 target */
loop();          /* 4. 启动渲染循环 */

/* ============ 搜索流程: scatter → gather to flower → show text ============ */
const textEl = document.getElementById('text');
const hintMsg = document.getElementById('hintMsg');
let pendingTimers = [];

function clearPending(){ pendingTimers.forEach(clearTimeout); pendingTimers = []; }

function showFlower(flower){
  clearPending();
  hintMsg.classList.add('hidden');
  textEl.classList.remove('on');
  /* 下滑: 让 search 输入框 + hints 都留在视口, 这样用户既能点 pill 换下一朵, 也能改输入;
     若当前已滚得比目标更低, 就保持, 避免每点一次都往回跳 */
  pendingTimers.push(setTimeout(() => {
    const search = document.querySelector('.search');
    const y = search.getBoundingClientRect().top + window.scrollY - 12;
    if(window.scrollY < y - 4) window.scrollTo({ top: y, behavior: 'smooth' });
  }, 120));
  /* 直接从当前位置 (无论 cluster 还是其它花) 错峰流到新花的目标点,
     软弹簧 + 微扰动让过程自然像烟散再凝, 不再有硬 "散/聚" 切换. */
  mode = 'flower';
  currentFlowerId = flower.id;
  seedFlower(flower.id);
  /* 粒子大致聚好后, 文字淡入 (经验上 1800ms 足够) */
  pendingTimers.push(setTimeout(() => {
    textEl.innerHTML = `
      <div class="zh">${flower.zh.split('').map((c,j,a) => j===a.length-1?`<em>${c}</em>`:c).join('')}</div>
      <div class="en">${flower.en}</div>
      <div class="meaning">${flower.meaning}</div>
      <div class="canon">${flower.canon}</div>
      <div class="num">no. ${String(FLOWERS.indexOf(flower)+1).padStart(2,'0')} / ${String(FLOWERS.length).padStart(2,'0')}</div>
    `;
    textEl.classList.add('on');
  }, 1800));
}

function backToCluster(){
  clearPending();
  textEl.classList.remove('on');
  hintMsg.classList.remove('hidden');
  mode = 'cluster';
  currentFlowerId = null;
  seedCluster();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* 事件 */
const input = document.getElementById('q');
let inputTimer = null;
input.addEventListener('input', () => {
  clearTimeout(inputTimer);
  const v = input.value.trim();
  if(v === ''){ backToCluster(); return; }
  /* 防抖 200ms, 避免每敲一个字都重画 */
  inputTimer = setTimeout(() => {
    const flower = search(v);
    if(flower) showFlower(flower);
    else backToCluster();
  }, 220);
});

document.querySelectorAll('.hints button').forEach(btn => {
  btn.addEventListener('click', () => {
    input.value = btn.dataset.q;
    const flower = search(btn.dataset.q);
    if(flower) showFlower(flower);
    input.focus();
  });
});
</script>

</body>
</html>
