<!--
  Effect: Aurora Silk
  -------------------
  What it is:
    A slow, living sheet of iridescent "silk" that drifts across a deep-night
    sky. The cursor exerts a gentle gravitational pull — silk threads curl
    toward it, brighten, and leave a trail of luminous dust that fades.

  Core technique (in my own words):
    A flow-field rendered as many long translucent strokes on a 2D canvas.
    Each stroke is a short Euler-integrated walk through a time-evolving
    noise-like field (cheap trig sums, not real perlin). Colours come from
    HSL indexed by the stroke's angle, so local vorticity reads as an
    aurora of shifting hues. The cursor adds a radial velocity term and
    a soft highlight — that's what makes the flow "reach" for you.
    A second, additive dust layer hosts a few hundred sparks that are
    advected by the same field; those carry the motion highlight.
    Finally an alpha-fade rectangle each frame creates the long silky
    tails without ever clearing the buffer.

  What the viewer does:
    Move the mouse (or finger) across the page — the silk curls, brightens
    and flows toward the pointer. Click to pulse a bloom of sparks.
    Works stand-alone too: on idle it breathes on its own.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Aurora Silk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #05060c;
    --fg:  #e7ecff;
    --dim: #8c93b2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--ink);
    color: var(--fg);
    overflow: hidden;
    font-family: 'Fraunces', 'Times New Roman', serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  canvas {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    display: block;
    touch-action: none;
    cursor: crosshair;
  }
  #silk { z-index: 1; }
  #dust { z-index: 2; mix-blend-mode: screen; }

  .ui {
    position: fixed;
    z-index: 10;
    pointer-events: none;
    color: var(--fg);
    user-select: none;
  }
  .title {
    top: clamp(24px, 5vh, 56px);
    left: clamp(24px, 4vw, 64px);
    font-weight: 300;
    letter-spacing: 0.01em;
  }
  .title .eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .title h1 {
    font-size: clamp(44px, 7.2vw, 104px);
    margin: 0;
    line-height: 0.95;
    font-weight: 300;
    font-style: italic;
    letter-spacing: -0.01em;
    background: linear-gradient(92deg,
      #fdf6e8 0%, #ffc7d8 28%, #a9c2ff 58%, #9af0d8 82%, #fdf6e8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 1px 24px rgba(170, 200, 255, 0.12));
  }
  .title p {
    margin: 18px 0 0;
    font-size: clamp(13px, 1.15vw, 16px);
    color: var(--dim);
    max-width: 34ch;
    line-height: 1.55;
  }

  .meta {
    bottom: clamp(20px, 4vh, 40px);
    left: clamp(24px, 4vw, 64px);
    right: clamp(24px, 4vw, 64px);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .meta .dot {
    display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: #9af0d8;
    margin-right: 10px;
    box-shadow: 0 0 8px #9af0d8aa;
    animation: pulse 2.4s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%,100% { opacity: .35; transform: scale(.85); }
    50%     { opacity: 1;   transform: scale(1);   }
  }
  .vignette {
    position: fixed; inset: 0; z-index: 3;
    pointer-events: none;
    background: radial-gradient(120% 90% at 50% 50%,
      transparent 55%, rgba(5,6,12,0.55) 88%, rgba(5,6,12,0.92) 100%);
  }
  .grain {
    position: fixed; inset: 0; z-index: 4;
    pointer-events: none;
    opacity: .06;
    mix-blend-mode: overlay;
    background-image:
      repeating-radial-gradient(circle at 0 0,
        rgba(255,255,255,.6) 0, rgba(255,255,255,.6) 1px,
        transparent 1px, transparent 3px);
    background-size: 3px 3px;
  }
</style>
</head>
<body>
<style>#lab-back{position:fixed;top:18px;left:20px;z-index:99999;padding:8px 14px;border-radius:999px;border:1px solid rgba(246,237,219,0.4);background:rgba(10,7,5,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:#f6eddb;text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.26em;text-transform:uppercase;line-height:1;cursor:pointer;transition:background 0.2s,color 0.2s,border-color 0.2s}#lab-back:hover{background:#f6eddb;color:#1b1815;border-color:#f6eddb}</style>
<a id="lab-back" href="../index.html" title="back to gallery">← back</a>
  <canvas id="silk"></canvas>
  <canvas id="dust"></canvas>
  <div class="vignette"></div>
  <div class="grain"></div>

  <div class="ui title">
    <div class="eyebrow">study &nbsp;/&nbsp; no. 22</div>
    <h1>Aurora&nbsp;Silk</h1>
    <p>A field of light follows your hand. Move slowly — the silk breathes. Click to release a bloom of sparks.</p>
  </div>

  <div class="ui meta">
    <span><span class="dot"></span>live</span>
    <span id="fps">0000 strokes &middot; 00 fps</span>
    <span>aurora · silk · flow-field</span>
  </div>

<script>
(() => {
  'use strict';

  const silkCanvas = document.getElementById('silk');
  const dustCanvas = document.getElementById('dust');
  const silkCtx = silkCanvas.getContext('2d');
  const dustCtx = dustCanvas.getContext('2d');
  const fpsEl = document.getElementById('fps');

  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    for (const c of [silkCanvas, dustCanvas]) {
      c.width  = Math.floor(W * DPR);
      c.height = Math.floor(H * DPR);
      c.style.width = W + 'px';
      c.style.height = H + 'px';
    }
    silkCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
    dustCtx.setTransform(DPR, 0, 0, DPR, 0, 0);

    // gentle initial wash so the first frames aren't pitch black
    const g = silkCtx.createRadialGradient(W*0.5, H*0.55, 0, W*0.5, H*0.55, Math.max(W,H)*0.7);
    g.addColorStop(0, 'rgba(30, 40, 80, 0.35)');
    g.addColorStop(1, 'rgba(5, 6, 12, 0)');
    silkCtx.fillStyle = g;
    silkCtx.fillRect(0, 0, W, H);
  }
  window.addEventListener('resize', resize);
  resize();

  // ——— pointer state ———
  const pointer = {
    x: W * 0.5,
    y: H * 0.5,
    tx: W * 0.5,
    ty: H * 0.5,
    active: false,
    lastMove: 0
  };
  function setPointer(x, y) {
    pointer.tx = x;
    pointer.ty = y;
    pointer.active = true;
    pointer.lastMove = performance.now();
  }
  window.addEventListener('mousemove', e => setPointer(e.clientX, e.clientY));
  window.addEventListener('touchmove', e => {
    if (e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  window.addEventListener('touchstart', e => {
    if (e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  window.addEventListener('click', e => burst(e.clientX, e.clientY));
  window.addEventListener('touchend', e => {
    if (e.changedTouches[0]) burst(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  });

  // ——— flow field (cheap pseudo-noise) ———
  // angle(x, y, t) = sum of a couple of sinusoids, scale-invariant-ish
  function flowAngle(x, y, t) {
    const s1 = 0.0022, s2 = 0.0041;
    const a =
      Math.sin(x * s1 + t * 0.00025) +
      Math.cos(y * s1 + t * 0.00031) * 0.9 +
      Math.sin((x + y) * s2 - t * 0.00018) * 0.6 +
      Math.cos((x - y * 1.3) * s2 + t * 0.00022) * 0.45;
    return a * Math.PI * 0.55;
  }

  // ——— sparks (dust layer) ———
  const sparks = [];
  const SPARK_MAX = 520;
  function seedSparks(n) {
    for (let i = 0; i < n; i++) {
      sparks.push({
        x: Math.random() * W,
        y: Math.random() * H,
        life: Math.random() * 1,
        maxLife: 2 + Math.random() * 3,
        hue: 180 + Math.random() * 160
      });
    }
  }
  seedSparks(SPARK_MAX);

  function burst(x, y) {
    for (let i = 0; i < 120; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * 80;
      sparks.push({
        x: x + Math.cos(a) * r,
        y: y + Math.sin(a) * r,
        life: 0,
        maxLife: 1.4 + Math.random() * 1.6,
        hue: 190 + Math.random() * 140,
        kick: 2.4 + Math.random() * 2.6,
        kickAng: a
      });
    }
    if (sparks.length > SPARK_MAX + 400) sparks.splice(0, sparks.length - (SPARK_MAX + 400));
  }

  // ——— main loop ———
  let frame = 0;
  let lastT = performance.now();
  let smoothedFps = 60;
  let strokeCount = 0;

  function frameTick(now) {
    const dt = Math.min(40, now - lastT);
    lastT = now;
    frame++;

    // pointer easing
    pointer.x += (pointer.tx - pointer.x) * 0.08;
    pointer.y += (pointer.ty - pointer.y) * 0.08;

    // idle auto-drift: lissajous path when the user hasn't moved
    const idle = now - pointer.lastMove > 1600;
    if (idle) {
      const t = now * 0.00035;
      pointer.tx = W * (0.5 + 0.33 * Math.sin(t * 1.1));
      pointer.ty = H * (0.5 + 0.28 * Math.cos(t * 0.9 + 1.3));
    }

    // ---- silk layer ----
    // long-tail fade
    silkCtx.globalCompositeOperation = 'source-over';
    silkCtx.fillStyle = 'rgba(5, 6, 12, 0.055)';
    silkCtx.fillRect(0, 0, W, H);

    // draw strokes
    silkCtx.globalCompositeOperation = 'lighter';
    const density = Math.max(90, Math.min(260, Math.floor((W * H) / 9000)));
    strokeCount = density;

    for (let i = 0; i < density; i++) {
      // start point biased around pointer but spread across canvas
      const biasToward = 0.35 + Math.random() * 0.45;
      let sx = Math.random() * W;
      let sy = Math.random() * H;
      // occasionally start near pointer for "reaching" threads
      if (Math.random() < 0.18) {
        const r = 30 + Math.random() * 220;
        const a = Math.random() * Math.PI * 2;
        sx = pointer.x + Math.cos(a) * r;
        sy = pointer.y + Math.sin(a) * r;
      } else if (Math.random() < 0.5) {
        sx = sx * (1 - biasToward) + pointer.x * biasToward;
        sy = sy * (1 - biasToward) + pointer.y * biasToward;
      }

      let x = sx, y = sy;
      const steps = 14 + (Math.random() * 10) | 0;
      const step = 4 + Math.random() * 3;

      // hue from flow angle at start, so nearby threads share hue (aurora bands)
      const a0 = flowAngle(x, y, now);
      const hue = (a0 * 180 / Math.PI * 0.9 + now * 0.012) % 360;
      const sat = 70 + Math.random() * 20;
      const light = 55 + Math.random() * 15;

      silkCtx.beginPath();
      silkCtx.moveTo(x, y);
      for (let s = 0; s < steps; s++) {
        let a = flowAngle(x, y, now);
        // pointer pull: add a tangential + slight radial component
        const dx = pointer.x - x;
        const dy = pointer.y - y;
        const d2 = dx*dx + dy*dy;
        const d  = Math.sqrt(d2) + 0.0001;
        const pullR = 320;
        const w = Math.max(0, 1 - d / pullR);
        // tangential (swirl) direction
        const ta = Math.atan2(dy, dx) + Math.PI * 0.5;
        a = a * (1 - w * 0.75) + ta * (w * 0.75);
        // radial nudge
        x += Math.cos(a) * step + (dx / d) * w * 0.6;
        y += Math.sin(a) * step + (dy / d) * w * 0.6;
        silkCtx.lineTo(x, y);
      }

      const alpha = 0.055 + Math.random() * 0.09;
      silkCtx.strokeStyle = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
      silkCtx.lineWidth = 0.6 + Math.random() * 1.1;
      silkCtx.stroke();
    }

    // highlight halo on the pointer (very soft)
    const r0 = 110;
    const grd = silkCtx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, r0);
    grd.addColorStop(0, 'rgba(255, 240, 220, 0.18)');
    grd.addColorStop(0.3, 'rgba(180, 210, 255, 0.06)');
    grd.addColorStop(1, 'rgba(0, 0, 0, 0)');
    silkCtx.fillStyle = grd;
    silkCtx.fillRect(pointer.x - r0, pointer.y - r0, r0 * 2, r0 * 2);

    // ---- dust layer ----
    // fade dust faster than silk so sparks feel bright & punchy
    dustCtx.globalCompositeOperation = 'destination-out';
    dustCtx.fillStyle = 'rgba(0, 0, 0, 0.08)';
    dustCtx.fillRect(0, 0, W, H);

    dustCtx.globalCompositeOperation = 'lighter';
    for (let i = sparks.length - 1; i >= 0; i--) {
      const p = sparks[i];
      const a = flowAngle(p.x, p.y, now);
      let vx = Math.cos(a) * 0.9;
      let vy = Math.sin(a) * 0.9;

      // pointer pull
      const dx = pointer.x - p.x;
      const dy = pointer.y - p.y;
      const d  = Math.sqrt(dx*dx + dy*dy) + 0.001;
      const w  = Math.max(0, 1 - d / 260);
      vx += (dx / d) * w * 1.4;
      vy += (dy / d) * w * 1.4;

      if (p.kick && p.kick > 0.01) {
        vx += Math.cos(p.kickAng) * p.kick;
        vy += Math.sin(p.kickAng) * p.kick;
        p.kick *= 0.88;
      }

      p.x += vx;
      p.y += vy;
      p.life += dt / 1000;

      if (p.life > p.maxLife || p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) {
        // respawn as ambient if under base count
        if (sparks.length <= SPARK_MAX) {
          p.x = Math.random() * W;
          p.y = Math.random() * H;
          p.life = 0;
          p.maxLife = 2 + Math.random() * 3;
          p.hue = 180 + Math.random() * 160;
          p.kick = 0;
        } else {
          sparks.splice(i, 1);
          continue;
        }
      }

      const lifeN = p.life / p.maxLife;
      const fade = Math.sin(lifeN * Math.PI);
      const glow = 0.35 + w * 0.65;
      const alpha = 0.5 * fade * glow;
      const size = (0.9 + w * 2.2) * (0.7 + Math.sin(lifeN * Math.PI) * 0.6);

      dustCtx.fillStyle = `hsla(${p.hue}, 90%, ${65 + w * 20}%, ${alpha})`;
      dustCtx.beginPath();
      dustCtx.arc(p.x, p.y, size, 0, Math.PI * 2);
      dustCtx.fill();
    }

    // ---- hud ----
    if (frame % 12 === 0) {
      const dur = dt || 16.7;
      smoothedFps = smoothedFps * 0.85 + (1000 / dur) * 0.15;
      const s = String(strokeCount).padStart(4, '0');
      const f = String(Math.round(smoothedFps)).padStart(2, '0');
      fpsEl.textContent = `${s} strokes \u00b7 ${f} fps`;
    }

    requestAnimationFrame(frameTick);
  }
  requestAnimationFrame(frameTick);
})();
</script>
</body>
</html>
