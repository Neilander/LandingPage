<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>frontend effects lab · 13 · neon ripple</title>
<!--
  参考: codepen.io/VoXelo/pen/MYWLBRm (Interactive WebGL Neon Ripple),
        codepen.io/phillip-gimmi/pen/raNRYpM (WebGL Neon Wave),
        shadertoy fbm 工具箱 + ring/smoothstep 配方。
  技术: vanilla WebGL fullscreen quad, fragment-only shader;
        click/auto-spawn 储存最近 8 个涟漪源 (xy+startTime) 作 uniform 数组,
        每源 ring() 环 + 时间衰减; 背景 fbm 能量场 + 鼠标周围 swirl UV 扭曲;
        加噪点 grain 和 filmic 曲线提质感。
  观感: 深紫底, 移动/点击处迸发 cyan→magenta 涟漪, 闲置时自动随机点火, 录屏 10 秒必有爆点。
-->
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg-0:#05020c;--fg-0:#f5f3ff;--fg-muted:#a1a1aa;--cyan:#22d3ee;--magenta:#ec4899;--violet:#a855f7}
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-0);color:var(--fg-0);font-family:'Space Grotesk',system-ui,sans-serif;cursor:none}
canvas#gl{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:1}
.ui{position:fixed;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:32px 40px;z-index:5;mix-blend-mode:screen}
.row{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-0);opacity:0.82}
.title{font-size:11px;letter-spacing:0.22em}
.hero{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:4;text-align:center;padding:0 24px;mix-blend-mode:screen}
.hero .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.32em;opacity:0.75;text-transform:uppercase;margin-bottom:22px}
.hero h1{font-family:'Space Grotesk',sans-serif;font-weight:300;font-size:clamp(48px, 8.2vw, 136px);line-height:0.88;letter-spacing:-0.035em;color:#f5f3ff;max-width:12ch}
.hero h1 em{font-style:italic;font-weight:600;color:#f5f3ff;text-shadow:0 0 24px rgba(34,211,238,0.35)}
.hero .tag{margin-top:26px;max-width:460px;font-size:13px;letter-spacing:0.02em;color:var(--fg-muted);line-height:1.55}
.cursor{position:fixed;top:0;left:0;width:22px;height:22px;border-radius:50%;border:1.2px solid #f5f3ff;pointer-events:none;z-index:10;transform:translate(-50%,-50%);mix-blend-mode:screen}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="hero">
  <div class="eyebrow">no. 13 · neon ripple</div>
  <h1>press <em>anywhere.</em><br>watch it <em>bloom.</em></h1>
  <div class="tag">Click, drag, or just wait. Eight concentric rings expand into a deep-violet void, mixing cyan and magenta on every collision.</div>
</div>
<div class="ui">
  <div class="row">
    <div class="title">frontend effects lab · 2026</div>
    <div class="title">[ 03 / 10 ]</div>
  </div>
  <div class="row">
    <div class="title">fragment shader · ~40 lines · mouse + click + swirl</div>
    <div class="title">v0.1 · 17 Apr 2026</div>
  </div>
</div>
<div class="cursor"></div>

<script>
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl', {antialias:true, premultipliedAlpha:false});
if(!gl){ document.body.innerHTML = '<p style="padding:40px;font-family:monospace">WebGL not available.</p>'; throw 0; }

const VS = `attribute vec2 aPos; void main(){ gl_Position=vec4(aPos,0.,1.);}`;

const FS = `
precision highp float;
uniform vec2  uRes;
uniform float uTime;
uniform vec2  uMouse;
uniform vec3  uClicks[8]; /* x,y (in aspect-normalized), startTime */

float h21(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
float n2(vec2 p){
  vec2 i=floor(p), f=fract(p);
  float a=h21(i), b=h21(i+vec2(1,0)), c=h21(i+vec2(0,1)), d=h21(i+vec2(1,1));
  vec2 u=f*f*(3.-2.*f);
  return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y;
}
float fbm(vec2 p){
  float v=0., a=0.5;
  mat2 R=mat2(0.8,-0.6,0.6,0.8);
  for(int i=0;i<5;i++){ v+=a*n2(p); p=R*p*2.; a*=0.5; }
  return v;
}
vec2 swirl(vec2 uv, vec2 c, float k){
  vec2 d=uv-c; float r=length(d), a=atan(d.y,d.x)+k/(r+0.08);
  return c+r*vec2(cos(a),sin(a));
}
float ring(float r, float c, float t){
  return smoothstep(c-t,c,r) - smoothstep(c,c+t,r);
}
/* Inigo-Quilez palette */
vec3 pal(float t){
  vec3 a=vec3(0.42,0.30,0.55), b=vec3(0.45,0.40,0.45), c=vec3(1.0,0.9,0.9), d=vec3(0.10,0.35,0.65);
  return a + b*cos(6.28318*(c*t + d));
}

void main(){
  vec2 uv = gl_FragCoord.xy / uRes.xy;
  float ar = uRes.x/uRes.y;
  vec2 auv = vec2(uv.x*ar, uv.y);
  vec2 am  = vec2(uMouse.x*ar, uMouse.y);

  /* swirl around mouse */
  float mr = distance(auv, am);
  float swirlK = 0.12 * smoothstep(0.55, 0.0, mr);
  vec2 duv = swirl(auv, am, swirlK);

  /* background: slow flowing fbm field */
  float t = uTime*0.18;
  vec2 q = vec2(fbm(duv*1.6 + t), fbm(duv*1.6 + 9.1 - t));
  float bg = fbm(duv*2.4 + q*1.6);
  vec3 base = vec3(0.02,0.008,0.04);
  vec3 sky  = pal(bg*0.6 + 0.05);
  vec3 col  = mix(base, base + sky*0.14, smoothstep(0.2,0.9,bg));

  /* mouse halo (always on) */
  float halo = exp(-mr*3.5) * 0.35;
  col += halo * mix(vec3(0.133,0.827,0.933), vec3(0.925,0.282,0.600), 0.5+0.5*sin(uTime*0.8));

  /* rings from click sources */
  for(int i=0;i<8;i++){
    vec3 cs = uClicks[i];
    if(cs.z < 0.0) continue;
    float age = uTime - cs.z;
    if(age < 0.0 || age > 3.2) continue;
    vec2 cp = vec2(cs.x*ar, cs.y);
    float r = distance(auv, cp);
    /* two expanding rings per event: primary + echo */
    float speed1 = 0.55;
    float speed2 = 0.30;
    float rad1 = age*speed1;
    float rad2 = age*speed2 + 0.06;
    float thick1 = mix(0.018, 0.048, clamp(age/2.8,0.,1.));
    float thick2 = mix(0.010, 0.035, clamp(age/2.8,0.,1.));
    float life = 1.0 - smoothstep(0.0, 3.2, age);
    float r1 = ring(r, rad1, thick1) * life;
    float r2 = ring(r, rad2, thick2) * life * 0.55;
    /* color by age: cyan → magenta → violet */
    vec3 c1 = mix(vec3(0.133,0.827,0.933), vec3(0.925,0.282,0.600), smoothstep(0.0,1.3,age));
    vec3 c2 = mix(vec3(0.925,0.282,0.600), vec3(0.66,0.33,0.97), smoothstep(1.0,2.8,age));
    col += (r1*2.8)*c1;
    col += (r2*1.8)*c2;
    /* soft glow disk inside the expanding ring */
    float disk = smoothstep(rad1, rad1-0.22, r) * smoothstep(rad1-0.4, rad1, r);
    col += disk * 0.25 * c1 * life;
  }

  /* subtle vignette */
  float vig = smoothstep(1.25, 0.25, length(uv-0.5));
  col *= mix(0.55, 1.0, vig);

  /* grain + filmic */
  float grain = (h21(gl_FragCoord.xy + uTime*71.0) - 0.5) * 0.035;
  col += grain;
  col = pow(col, vec3(0.93));
  gl_FragColor = vec4(col, 1.0);
}`;

function sh(t,s){ const o=gl.createShader(t); gl.shaderSource(o,s); gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS)){ console.error(gl.getShaderInfoLog(o)); throw 0;} return o;}
const prog=gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER,VS));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){ console.error(gl.getProgramInfoLog(prog)); throw 0; }
gl.useProgram(prog);
const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'aPos');
gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

const uRes   = gl.getUniformLocation(prog,'uRes');
const uTime  = gl.getUniformLocation(prog,'uTime');
const uMouse = gl.getUniformLocation(prog,'uMouse');
const uClicks= gl.getUniformLocation(prog,'uClicks');

const dpr = Math.min(window.devicePixelRatio||1, 2);
function resize(){
  const w=Math.round(window.innerWidth*dpr), h=Math.round(window.innerHeight*dpr);
  canvas.width=w; canvas.height=h;
  canvas.style.width=window.innerWidth+'px'; canvas.style.height=window.innerHeight+'px';
  gl.viewport(0,0,w,h); gl.uniform2f(uRes, w, h);
}
window.addEventListener('resize', resize); resize();

/* clicks buffer: last 8 ring sources (x,y,startTime). z<0 = empty */
const clicks = new Float32Array(8*3); for(let i=0;i<8;i++) clicks[i*3+2] = -1;
let clickIdx = 0;
const t0 = performance.now();
function tNow(){ return (performance.now()-t0)/1000; }

function spawnRing(nx, ny){
  clicks[clickIdx*3]   = nx;
  clicks[clickIdx*3+1] = ny;
  clicks[clickIdx*3+2] = tNow();
  clickIdx = (clickIdx+1)%8;
}

const mouse = {x:0.5, y:0.5, tx:0.5, ty:0.5, moveAcc:0};
window.addEventListener('pointermove', e => {
  const nx = e.clientX/window.innerWidth;
  const ny = 1 - e.clientY/window.innerHeight;
  mouse.moveAcc += Math.hypot(nx-mouse.tx, ny-mouse.ty);
  mouse.tx = nx; mouse.ty = ny;
  /* auto-spawn small rings when moving fast */
  if(mouse.moveAcc > 0.22){ spawnRing(nx, ny); mouse.moveAcc = 0; }
});
window.addEventListener('pointerdown', e => {
  const nx = e.clientX/window.innerWidth;
  const ny = 1 - e.clientY/window.innerHeight;
  spawnRing(nx, ny);
});

/* idle auto ripple every ~2s */
let lastIdle = 0;
function maybeIdle(){
  const T = tNow();
  if(T - lastIdle > 1.7){
    spawnRing(0.15 + Math.random()*0.7, 0.15 + Math.random()*0.7);
    lastIdle = T;
  }
}

/* cursor follower */
const cursorEl = document.querySelector('.cursor');
let cx=0, cy=0, ctx=0, cty=0;
window.addEventListener('pointermove', e => { ctx=e.clientX; cty=e.clientY; });

/* seed 3 initial ripples so first frame is interesting */
spawnRing(0.3, 0.45); spawnRing(0.7, 0.55); spawnRing(0.5, 0.35);

function frame(){
  mouse.x += (mouse.tx-mouse.x)*0.12;
  mouse.y += (mouse.ty-mouse.y)*0.12;
  cx += (ctx-cx)*0.22; cy += (cty-cy)*0.22;
  cursorEl.style.transform = `translate(${cx-11}px,${cy-11}px)`;

  gl.uniform1f(uTime, tNow());
  gl.uniform2f(uMouse, mouse.x, mouse.y);
  gl.uniform3fv(uClicks, clicks);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  maybeIdle();
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
